<VirtualHost *:80>
    ServerName toko.pi-executive.com
    DocumentRoot /var/www/toko.pi-executive.com

    ProxyPreserveHost On
    ProxyPass /api/ http://127.0.0.1:3011/api/
    ProxyPassReverse /api/ http://127.0.0.1:3011/api/
    ProxyPass /uploads/ http://127.0.0.1:3011/uploads/
    ProxyPassReverse /uploads/ http://127.0.0.1:3011/uploads/

    <Directory /var/www/toko.pi-executive.com>
        Options Indexes FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    RewriteEngine On
    RewriteCond %{REQUEST_URI} ^/api/ [OR]
    RewriteCond %{REQUEST_URI} ^/assets/ [OR]
    RewriteCond %{REQUEST_URI} ^/brand/ [OR]
    RewriteCond %{REQUEST_URI} ^/uploads/ [OR]
    RewriteCond %{REQUEST_URI} ^/validation-key\.txt$ [OR]
    RewriteCond %{REQUEST_URI} ^/logo_pi\.png$ [OR]
    RewriteCond %{REQUEST_URI} ^/vite\.svg$
    RewriteRule ^ - [L]

    RewriteCond %{REQUEST_FILENAME} -f [OR]
    RewriteCond %{REQUEST_FILENAME} -d
    RewriteRule ^ - [L]

    RewriteRule ^ /index.html [L]

    ErrorLog /var/log/apache2/toko.pi-executive.com-error.log
    CustomLog /var/log/apache2/toko.pi-executive.com-access.log combined
</VirtualHost>
